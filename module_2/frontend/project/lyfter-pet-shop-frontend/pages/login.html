<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="login pet shop e-commerce" />
    <title>Lyfter Pet Shop</title>
    <link rel="icon" type="image/png" href="../assets/icons/icon-dog.png" />
    <link rel="stylesheet" href="../css/login-register/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../js/login/main.js"></script>
  </head>

  <body>
    <header>
      <section class="section-logo">
        <figure class="logo-header">
          <img
            src="../assets/images/logo.png"
            alt="Lyfter Pet Shop Logo"
            class="logo"
          />
        </figure>
      </section>
    </header>

    <main class="page">
      <div class="login-register-container">
        <h1>Login to Lyfter Pet Shop</h1>

        <form class="login-register-form" id="login-form">
          <label for="email" class="login-register-info">Email:</label>
          <input
            type="email"
            id="email"
            name="email"
            class="login-register-input"
          />

          <label for="password" class="login-register-info">Password:</label>
          <input
            type="password"
            id="password"
            name="password"
            class="login-register-input"
            required
          />

          <button type="submit" class="button-login-register">Login</button>

          <p class="register-link-container">
            Don't have an account? <a href="register.html">Register here</a>
          </p>

          <h2 id="login-register-message"></h2>

          <p class="powered-by">Powered by <strong>Lyfter</strong></p>
        </form>
      </div>
    </main>

    <footer>
      <section class="copy-rights">
        <p>© <span id="year"></span> Lyfter Pet Shop. All rights reserved.</p>
      </section>
    </footer>

    <script>
      // get year dynamically
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
