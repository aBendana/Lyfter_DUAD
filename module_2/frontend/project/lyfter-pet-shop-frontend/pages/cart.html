<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="pet shop cart details" />
    <title>Lyfter Pet Shop</title>
    <link rel="icon" type="image/png" href="../assets/icons/icon-dog.png" />
    <link rel="stylesheet" href="../css/cart/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../js/cart/main.js"></script>
  </head>

  <body>
    <header>
      <nav id="nav-info" class="nav-info">
        <div id="login-register-container" class="div-log">
          <span><a id="login">Login</a> or <a id="register">Register</a></span>
        </div>

        <div class="div-info">
          <span
            ><a id="products">Products</a> | <a id="about">About us</a> |
            <a id="locations">Locations</a> |
            <a id="contact">Contact Us</a>
          </span>
        </div>
      </nav>

      <!-- this section will be used to show the logged user info and logout button -->
      <nav id="nav-logged-user" class="nav-logged-user"></nav>
    </header>

    <main>
      <div id="cart-container" class="cart-container">
        <h1 id="cart-title" class="cart-title">Your Shopping Cart</h1>

        <div id="cart-info" class="cart-info">
          <section id="cart-items-section" class="cart-items-section">
            <!-- this section will be created dynamically -->
          </section>

          <section id="cart-summary-section" class="cart-summary-section">
            <h2 class="cart-summary-title">Cart Summary:</h2>
            <h2 id="total-items" class="total-items"></h2>
            <h2 id="sub-total-price" class="sub-total-price"></h2>
            <button id="checkout-button" class="checkout-button">
              Proceed to Checkout
            </button>
          </section>
        </div>
      </div>
    </main>

    <footer class="container-footer">
      <section class="social-media">
        <h2>Follow Us</h2>
        <div class="social-media-links">
          <img
            src="../assets/icons/facebook.png"
            alt="Facebook"
            id="facebook-link"
            class="icon-media"
          />
          <img
            src="../assets/icons/instagram.png"
            alt="Instagram"
            id="instagram-link"
            class="icon-media"
          />
          <img
            src="../assets/icons/pinterest.png"
            alt="Pinterest"
            id="pinterest-link"
            class="icon-media"
          />
          <img
            src="../assets/icons/youtube.png"
            alt="YouTube"
            id="youtube-link"
            class="icon-media"
          />
        </div>
      </section>

      <section class="copy-rights">
        <p>© <span id="year"></span> Lyfter Pet Shop. All rights reserved.</p>
      </section>
    </footer>
    <script>
      // get year dynamically for the footer
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
