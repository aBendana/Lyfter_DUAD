<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="change password, css, DOM, javascript" />
    <title>Change Password</title>
    <link href="4_style_change_password.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="4_code_change_password.js" defer></script>
  </head>

  <body>
    <div class="page">
      <div class="change-password-container">
        <p class="line"></p>
        <h1 id="change-password-title">Change Password</h1>

        <form id="change-password-form">
          <label for="current-password" class="passwords"
            >Current Password:</label
          >
          <input
            type="password"
            id="current-password"
            name="current-password"
            class="password-input"
            required
          />

          <label for="new-password" class="passwords">New Password:</label>
          <input
            type="password"
            id="new-password"
            name="new-password"
            class="password-input"
            required
          />

          <label for="confirm-password" class="passwords"
            >Confirm New Password:</label
          >
          <input
            type="password"
            id="confirm-password"
            name="confirm-password"
            class="password-input"
            required
          />

          <button type="submit" class="button-change-password">
            Change Password
          </button>

          <h2 id="change-password-message"></h2>

          <footer>Powered by <strong>Lyfter</strong></footer>
        </form>
      </div>
    </div>
  </body>
</html>
