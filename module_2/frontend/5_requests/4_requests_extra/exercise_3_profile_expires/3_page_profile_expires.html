<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="profile, css, DOM, javascript" />
    <title>profile</title>
    <link href="3_style_profile.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="3_code_load_expires_profile.js" defer></script>
  </head>

  <body>
    <div class="page">
      <div class="profile-card">
        <div class="logout-container">
          <button id="logout-button" class="button-logout">Logout</button>
        </div>

        <p class="line"></p>

        <img
          id="profile-image"
          class="profile-image"
          src="https://via.placeholder.com/150"
          alt="Profile Image"
        />

        <h1>Your Personal Information</h1>

        <div class="profile-data">
          <div class="personal-data">
            <span class="info-label">User ID:</span>
            <p class="p-data" id="profile-session-id"></p>
          </div>

          <div class="personal-data">
            <span class="info-label">First Name:</span>
            <p class="p-data" id="profile-first-name"></p>
          </div>

          <div class="personal-data">
            <span class="info-label">Last Name:</span>
            <p class="p-data" id="profile-last-name"></p>
          </div>

          <div class="personal-data">
            <span class="info-label">Username:</span>
            <p class="p-data" id="profile-username"></p>
          </div>

          <div class="personal-data">
            <span class="info-label">Address:</span>
            <p class="p-data" id="profile-address"></p>
          </div>

          <div class="personal-data">
            <span class="info-label">Email:</span>
            <p class="p-data" id="profile-email"></p>
          </div>

          <button
            type="button"
            class="change-password-button"
            id="change-password-button"
          >
            Change Password
          </button>
        </div>

        <footer>Powered by <strong>Lyfter</strong></footer>
      </div>
    </div>
  </body>
</html>
